<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expense Tracker - Home</title>
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <h2 class="logo">Expense Tracker</h2>
    <nav>
      <a href="dashboard.html" class="active">🏠 Home</a>
      <a href="statistics.html">📊 Statistics</a>
      <a href="categories.html">🏷️ Categories</a>
      <a href="profile.html">👤 Profile</a>
    </nav>
  </aside>

  <main class="content">
    <h1>Welcome to Expense Tracker</h1>

    <div class="balance-card">
      <p>Your available balance</p>
      <h2 id="balance">₹0</h2>
    </div>

    <div class="cards">
      <div class="card income">
        <span>Income</span>
        <h3 id="income">₹0</h3>
      </div>
      <div class="card expense">
        <span>Expense</span>
        <h3 id="expense">₹0</h3>
      </div>
    </div>

    <button class="add-btn" id="openModalBtn">+ Add Income / Expense</button>

    <h2>Recent Transactions</h2>
    <ul id="transactionList" class="transaction-list"></ul>
  </main>

</div>

<!-- Modal for Add Transaction -->
<div id="transactionModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" id="closeModalBtn">&times;</span>
    <h2>Add Transaction</h2>
    <form id="transactionForm">
      <label>
        Type:
        <select id="type" required>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </label>

      <label>
        Amount (₹):
        <input type="number" id="amount" min="0.01" step="0.01" required />
      </label>

      <label id="categoryWrapper">
        Category:
        <select id="category" required>
          <option value="">Select Category</option>
          <option value="Housing">Housing</option>
          <option value="Utilities">Utilities</option>
          <option value="Transportation">Transportation</option>
          <option value="Groceries">Groceries</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Health">Health</option>
          <option value="Education">Education</option>
          <option value="Debt Payments">Debt Payments</option>
          <option value="Others">Others</option>
        </select>
      </label>

      <label>
        Date:
        <input type="date" id="date" required />
      </label>

      <button type="submit" class="submit-btn">Add Transaction</button>
    </form>
  </div>
</div>
<script type="module" src="js/dashboard.js"></script>

</body>
</html>
